<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Agência Criativa Web</title>
</head>

<body>
    <header class="header">
        <div class="header__container">
            <img src="Black and White Minimalist Barbershop Logo.png" alt="imagem header " class="header__logo"
                srcset="">
            <nav>
                <section class="header__section">

                    <a class="header__link " href="index.html">Home</a>
                    <a class="header__link" href="Sobrenos.html">Sobre Nós</a>
                    <a class="header__link " href="Serviços.html">Serviços</a>
                    <a class="header__link " href="Depoimentos.html">Depoimentos</a>
                    <a class="header__link header__link--active" href="contato.html">Contato</a>
                </section>
            </nav>
        </div>
    </header>



    <main class="main-contato">
        <div class="main-contato__container">

            <h3>Entre em contato </h3>
            <form class="main-contato__form">
                <label for="Nome">Nome</label><br>
                <input class="main-contato__input" type="text" id="nome" name="nome" placeholder="Digite seu Nome" required><br>


                <label for="email">E-mail</label> <br>
                <input class="main-contato__input" type="email" id="email" name="email " placeholder="Digite seu E-mail" required>
                <br>

                <label for="mensagem">Mensagem:</label> <br>
                <textarea name="mensagem" class="main-contato__textarea" cols="50" rows="20" placeholder="Digite aqui">
                </textarea>
                <br>

                <button class="botao botao--primario" type="submit" id="enviar">Enviar</button>
            </form>


        </div>
    </main>


    <!-- Rodapé-->
    <footer class="footer">
        <p class="footer__paragrafo">Conecte-se com a gente</p>
        <a class="footer__link">Linkedin</a> ||
        <a class="footer__link">GitHub</a>
        <p class="footer__paragrafo"> &copy; 2026 Bida Barbershop - todos os direitos reservados</p>

    </footer>

</body>

</html>
